<!DOCTYPE html>
<html>
<head>
<title>ChartCart Store</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
background:#25D366;
color:white;
padding:15px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
width:200px;
margin:10px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

img{
width:100%;
border-radius:8px;
}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>ChartCart WhatsApp Store</h1>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 1</h3>
<p>₹299</p>
<a href="https://wa.me/919931203143?text=I want Product 1">
<button>Order on WhatsApp</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 2</h3>
<p>₹499</p>
<a href="https://wa.me/919931203143?text=I want Product 2">
<button>Order on WhatsApp</button>
</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Product 3</h3>
<p>₹799</p>
<a href="https://wa.me/919931203143?text=I want Product 3">
<button>Order on WhatsApp</button>
</a>
</div>

</div>

</body>
</html>
