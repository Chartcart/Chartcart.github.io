<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chartcart - Checkout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f4f7f9; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 12px; padding: 20px; max-width: 300px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .buy-btn { background: #fb641b; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 50px auto; border-radius: 15px; padding: 20px; position: relative; }
        .qr-box { border: 2px solid #2ecc71; padding: 10px; width: 220px; height: 220px; margin: 15px auto; }
        .qr-box img { width: 100%; }
        .wa-btn { background: #25D366; color: white; text-decoration: none; display: block; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Premium Product</h3>
        <p>Price: ₹1,499</p>
        <button class="buy-btn" onclick="openPayment(1499, 'Premium Product')">BUY NOW</button>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:10px;">Scan & Pay</h2>
            <div class="qr-box">
                <img id="dynamic-qr" src="" alt="QR">
            </div>
            <p>Amount: <strong id="payAmount"></strong></p>
            <p style="font-size:12px; color:green; margin-top:5px;">UPI ID: jamal0841417@okhdfcbank</p>
            <a id="waLink" href="#" class="wa-btn">Confirm on WhatsApp</a>
            <button onclick="closePayment()" style="margin-top:15px; border:none; background:none; color:red; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        function openPayment(amount, productName) {
            // Dash (-) yahan se hata diya gaya hai
            const upiId = "jamal0841417-1@okhdfcbank"; 
            const upiUrl = `upi://pay?pa=${upiId}&pn=Chartcart&am=${amount}&cu=INR`;
            const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiUrl)}`;
            
            document.getElementById('paymentModal').style.display = 'block';
            document.getElementById('payAmount').innerText = "₹" + amount;
            document.getElementById('dynamic-qr').src = qrApi;
            
            const waMessage = `https://wa.me/919931203143?text=Paid ₹${amount} for ${productName}`;
            document.getElementById('waLink').href = waMessage;
        }
        function closePayment() { document.getElementById('paymentModal').style.display = 'none'; }
    </script>
</body>
</html>
