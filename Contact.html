<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ChartCart Store</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            text-align: center;
        }

        /* Navigation Bar (Wahi design jo home page par tha) */
        .header {
            background: #222;
            padding: 15px 5px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header a {
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            background: #444; /* Baaki buttons dark rakhe hain */
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .header a.active {
            background: #25D366; /* Contact button ko highlight kiya hai */
        }

        .header a:hover {
            background: #1ebd5a;
        }

        /* Contact Section */
        .contact-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { color: #222; margin-bottom: 20px; }

        .contact-info {
            margin-bottom: 30px;
            text-align: left;
        }

        .contact-item {
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .contact-item b { color: #25D366; }

        /* Direct Buttons */
        .btn-call {
            display: block;
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .btn-whatsapp {
            display: block;
            width: 100%;
            padding: 12px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn-call:hover, .btn-whatsapp:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <nav class="header">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <div class="contact-container">
        <h1>Contact Us</h1>
        <p>Humein sampark karne ke liye niche diye gaye options ka use karein:</p>

        <div class="contact-info">
            <div class="contact-item">
                <b>Email:</b> support@chartcart.com
            </div>
            <div class="contact-item">
                <b>Address:</b> New Delhi, India
            </div>
            <div class="contact-item">
                <b>Time:</b> 10:00 AM - 8:00 PM
            </div>
...
        </div>

        <a href="tel:+919931203143" class="btn-call">📞 Call Now</a>
        <a href="https://wa.me/919931203143" class="btn-whatsapp">💬 Chat on WhatsApp</a>
    </div>

</body>
</html>
